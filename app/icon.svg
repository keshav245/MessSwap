<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Gradient for the right arrow -->
    <linearGradient id="rightGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <!-- 100% is the unrotated bottom (visual top), matching the orange/yellow tail -->
      <stop offset="0%" stop-color="#4495bd" />
      <stop offset="60%" stop-color="#b6a382" />
      <stop offset="100%" stop-color="#f7b257" />
    </linearGradient>

    <!-- Clip path to handle the perfect interlocking overlap of the left arrow head -->
    <clipPath id="topHalf">
      <rect x="0" y="0" width="500" height="250" />
    </clipPath>
  </defs>

  <!-- Background Base & Outer Shadow Effect -->
  <circle cx="250" cy="253" r="230" fill="#d9d9d9" />
  <circle cx="250" cy="250" r="230" fill="#fcfcfc" />

  <!-- Outer Ring Framework -->
  <!-- Outer thin darker blue ring -->
  <circle cx="250" cy="250" r="215" fill="none" stroke="#4891b5" stroke-width="8" />
  <!-- Thick lighter blue inner ring -->
  <circle cx="250" cy="250" r="185" fill="none" stroke="#67a8c9" stroke-width="35" />
  <!-- Inner thin darker edge for depth -->
  <circle cx="250" cy="250" r="166" fill="none" stroke="#3e81a3" stroke-width="4" />

  <!-- The Interlocking Cycle Arrows -->
  <g>
    <!-- 1. Base Left Arrow (Solid Blue) -->
    <!-- Tail at bottom center, sweeps left, head at top right pointing right -->
    <path id="leftArrow" 
          d="M 240 303 
             A 80 80 0 1 1 220 181 
             L 220 220 
             L 310 159 
             L 220 98 
             L 220 137 
             A 120 120 0 1 0 240 354 
             Z" 
          fill="#4495bd" />

    <!-- 2. Base Right Arrow (Gradient Orange to Blue) -->
    <!-- Exact duplicate of the left arrow, rotated 180 degrees. -->
    <use href="#leftArrow" fill="url(#rightGrad)" transform="rotate(180 250 250)" />

    <!-- 3. Overlapping Left Arrow Head (Clipping Magic) -->
    <!-- Redrawn just the top half of the left arrow so its head cleanly overlaps the right arrow's tail -->
    <use href="#leftArrow" clip-path="url(#topHalf)" />
  </g>

  <!-- Central Food & Dining Icons -->
  <g id="centerIcons">
    <!-- Plate -->
    <!-- Positioned center-right, partially obscured by the bowl -->
    <circle cx="250" cy="246" r="45" fill="none" stroke="#f4af5b" stroke-width="8" />
    <circle cx="250" cy="246" r="32" fill="#f4af5b" />

    <!-- Bowl -->
    <!-- Sits on top of the plate with a white stroke to act as negative space -->
    <path d="M 150 255 L 230 255 C 230 280, 215 290, 205 294 L 175 294 C 165 290, 150 280, 150 255 Z" 
          fill="#f4af5b" stroke="#fcfcfc" stroke-width="4" stroke-linejoin="round" />

    <!-- Fork -->
    <!-- Four tines on the right of the plate -->
    <path d="M 290 220 L 292 220 L 292 240 L 294 240 L 294 220 L 296 220 L 296 240 L 298 240 L 298 220 L 300 220 L 300 240 L 302 240 L 302 220 L 304 220 L 304 245 C 304 255, 299 258, 298 258 L 298 293 L 296 293 L 296 258 C 295 258, 290 255, 290 245 Z" 
          fill="#f4af5b" />

    <!-- Spoon -->
    <!-- Far right -->
    <path d="M 318 232 C 318 220, 332 220, 332 232 C 332 242, 327 246, 327 250 L 327 293 L 323 293 L 323 250 C 323 246, 318 242, 318 232 Z" 
          fill="#f4af5b" />

    <!-- Serving Tray Base -->
    <!-- Encompasses everything at the bottom -->
    <rect x="135" y="295" width="210" height="11" rx="5.5" fill="#f4af5b" />
    <rect x="150" y="304" width="16" height="10" rx="3" fill="#f4af5b" />
    <rect x="314" y="304" width="16" height="10" rx="3" fill="#f4af5b" />
  </g>
</svg>

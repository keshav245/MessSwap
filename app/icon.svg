<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
    <defs>
        <!-- Drop shadow for the main badge background -->
        <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.25"/>
        </filter>
        
        <!-- Gradient for the right arrow -->
        <linearGradient id="right-grad" gradientUnits="userSpaceOnUse" x1="0" y1="120" x2="0" y2="380">
            <stop offset="0%" stop-color="#fab958"/>
            <stop offset="100%" stop-color="#4ea1c3"/>
        </linearGradient>
    </defs>

    <!-- Base white circle with shadow -->
    <circle cx="250" cy="250" r="230" fill="#ffffff" filter="url(#drop-shadow)"/>

    <!-- Outer Rings -->
    <circle cx="250" cy="250" r="210" fill="none" stroke="#60b2cd" stroke-width="16"/>
    <circle cx="250" cy="250" r="182" fill="none" stroke="#4894b1" stroke-width="12"/>

    <!-- Left Arc (Teal) -->
    <path d="M 250,380 A 130,130 0 0,1 250,120" fill="none" stroke="#4ea1c3" stroke-width="44"/>
    
    <!-- Right Arc (Gradient) -->
    <path d="M 250,120 A 130,130 0 0,1 250,380" fill="none" stroke="url(#right-grad)" stroke-width="44"/>

    <!-- Top Arrowhead (Teal) -->
    <polygon points="245,70 330,120 245,170" fill="#4ea1c3"/>
    
    <!-- Bottom Arrowhead (Teal) -->
    <polygon points="255,430 170,380 255,330" fill="#4ea1c3"/>

    <!-- Center Graphics Group -->
    <g transform="translate(25, 15) scale(0.9)" fill="#f7b451">
        
        <!-- Plate -->
        <path d="M 190 295 A 50 50 0 1 1 290 295 Z" />
        <!-- Plate Inner Ring -->
        <path d="M 205 295 A 35 35 0 1 1 275 295" fill="none" stroke="#ffffff" stroke-width="4"/>

        <!-- Bowl -->
        <path d="M 160 255 L 225 255 C 225 295 160 295 160 255 Z" fill="#f7b451" stroke="#ffffff" stroke-width="5" stroke-linejoin="round"/>

        <!-- Fork -->
        <path d="M 297,225 L 300,225 L 300,240 A 1.5,1.5 0 0,0 303,240 L 303,225 L 306,225 L 306,240 A 1.5,1.5 0 0,0 309,240 L 309,225 L 312,225 L 312,242 C 312,252 297,252 297,242 Z"/>
        <rect x="302.5" y="248" width="4" height="47" rx="2"/>

        <!-- Spoon -->
        <ellipse cx="333" cy="235" rx="8" ry="13"/>
        <rect x="331" y="245" width="4" height="50" rx="2"/>

        <!-- Tray -->
        <rect x="145" y="295" width="210" height="12" rx="6"/>
        
        <!-- Tray Feet -->
        <rect x="170" y="303" width="16" height="8" rx="4"/>
        <rect x="314" y="303" width="16" height="8" rx="4"/>
        
    </g>
</svg>
